<style>
  .site-footer {
    background: #0d1f3c;
    color: #c8d8f0;
    padding: 2.5rem 0 1.5rem;
    margin-top: 3rem;
  }

  .footer-connect {
    text-align: center;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .footer-connect h3 {
    font-size: 1.3rem;
    font-weight: 700;
    color: white;
    margin-bottom: 0.5rem;
  }

  .footer-connect p {
    font-size: 0.93rem;
    color: #a0b8d8;
    margin-bottom: 1rem;
    max-width: 540px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  .footer-connect a.footer-email {
    display: inline-block;
    font-size: 0.95rem;
    color: #7db8f7;
    font-weight: 600;
    text-decoration: none;
    border: 1px solid #3a5a8a;
    border-radius: 4px;
    padding: 0.35em 0.9em;
  }

  .footer-connect a.footer-email:hover {
    background: #1a3a6a;
    color: white;
  }

  .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    font-size: 0.95rem;
    color: #6a88aa;
  }

  .footer-bottom a {
    color: #7db8f7;
    text-decoration: none;
  }

  .footer-bottom a:hover {
    text-decoration: underline;
  }

  .footer-social a {
    color: #7db8f7;
    text-decoration: none;
    margin-left: 1.2rem;
    font-size: 1.5rem;
  }

  .footer-social a:hover {
    color: white;
  }
</style>

<footer class="site-footer">
  <div class="wrapper">

    <div class="footer-bottom">
      <span>&copy; {{ 'now' | date: "%Y" }} {{ site.data.info.name }}</span>
      <div class="footer-social">
        <a href="https://scholar.google.com/citations?user={{ site.data.info.gs }}" target="_blank" title="Google Scholar"><i class="ai ai-google-scholar ai-lg"></i></a>
        {%- if site.data.info.social.linkedin_username -%}
        <a href="https://www.linkedin.com/in/{{ site.data.info.social.linkedin_username }}" target="_blank" title="LinkedIn"><i class="fab fa-linkedin fa-lg"></i></a>
        {%- endif -%}
        {%- if site.data.info.social.twitter_username -%}
        <a href="https://twitter.com/{{ site.data.info.social.twitter_username }}" target="_blank" title="Twitter/X"><i class="fab fa-x-twitter fa-lg"></i></a>
        {%- endif -%}
      </div>
    </div>

  </div>
</footer>
