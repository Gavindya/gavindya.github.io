- title: March Madness Prediction - NCAA® tournaments in 2017, 2018, 2019
  term:
  description: |-
    Created ML models to predict which team would win at each possible game in the next season, as a probability. We trained and evaluated each model using the four feature-sets, and evaluated their performances in terms of classification accuracy, and log loss.
  accomplishment: "Identified which feature sets carry the most predictive signal for tournament outcomes, providing a reusable evaluation framework for sports probability modeling."
