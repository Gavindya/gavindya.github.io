<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pdf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031b40"/>
      <stop offset="100%" stop-color="#0a4a96"/>
    </linearGradient>
  </defs>
  <rect width="800" height="180" rx="8" fill="url(#pdf-bg)"/>
  <g stroke="#4da3ff" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="36" x2="800" y2="36"/><line x1="0" y1="72" x2="800" y2="72"/>
    <line x1="0" y1="108" x2="800" y2="108"/><line x1="0" y1="144" x2="800" y2="144"/>
    <line x1="160" y1="0" x2="160" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="480" y1="0" x2="480" y2="180"/><line x1="640" y1="0" x2="640" y2="180"/>
  </g>
  <!-- Left panel: stacked document pages -->
  <!-- Page 3 (back) -->
  <rect x="38" y="38" width="60" height="78" rx="3" fill="none" stroke="#4da3ff" stroke-width="1" opacity="0.3"/>
  <!-- Page 2 (middle) -->
  <rect x="48" y="32" width="60" height="78" rx="3" fill="none" stroke="#4da3ff" stroke-width="1" opacity="0.5"/>
  <!-- Page 1 (front) -->
  <rect x="58" y="26" width="60" height="78" rx="3" fill="#031b40" stroke="#4da3ff" stroke-width="1.5" opacity="0.9"/>
  <!-- Page fold corner -->
  <polyline points="104,26 118,26 118,40" fill="none" stroke="#4da3ff" stroke-width="1"/>
  <polygon points="104,26 118,40 104,40" fill="#4da3ff" opacity="0.2"/>
  <!-- Text lines on page -->
  <line x1="64" y1="46" x2="112" y2="46" stroke="#8dc4f8" stroke-width="1.5" opacity="0.7"/>
  <line x1="64" y1="54" x2="108" y2="54" stroke="#8dc4f8" stroke-width="1" opacity="0.4"/>
  <line x1="64" y1="60" x2="112" y2="60" stroke="#8dc4f8" stroke-width="1" opacity="0.4"/>
  <line x1="64" y1="66" x2="100" y2="66" stroke="#8dc4f8" stroke-width="1" opacity="0.4"/>
  <line x1="64" y1="72" x2="112" y2="72" stroke="#8dc4f8" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="78" x2="106" y2="78" stroke="#8dc4f8" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="84" x2="112" y2="84" stroke="#8dc4f8" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="90" x2="98" y2="90" stroke="#8dc4f8" stroke-width="1" opacity="0.3"/>

  <!-- Middle: extraction arrows to structured fields -->
  <!-- Arrows flowing right -->
  <line x1="122" y1="55" x2="200" y2="55" stroke="#4da3ff" stroke-width="1.5" opacity="0.7" marker-end="url(#arr)"/>
  <line x1="122" y1="72" x2="200" y2="80" stroke="#4da3ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="122" y1="85" x2="200" y2="105" stroke="#4da3ff" stroke-width="1.5" opacity="0.6"/>
  <defs>
    <marker id="pdf-arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4da3ff" opacity="0.8"/>
    </marker>
  </defs>
  <line x1="122" y1="55" x2="198" y2="55" stroke="#4da3ff" stroke-width="1.3" opacity="0.7" marker-end="url(#pdf-arr)"/>
  <line x1="122" y1="72" x2="198" y2="80" stroke="#4da3ff" stroke-width="1.3" opacity="0.7" marker-end="url(#pdf-arr)"/>
  <line x1="122" y1="85" x2="198" y2="106" stroke="#4da3ff" stroke-width="1.3" opacity="0.6" marker-end="url(#pdf-arr)"/>
  <!-- Structured field boxes -->
  <rect x="200" y="44" width="90" height="18" rx="3" fill="#4da3ff" opacity="0.12" stroke="#4da3ff" stroke-width="1"/>
  <text x="245" y="57" font-family="Arial,sans-serif" font-size="9" fill="#8dc4f8" text-anchor="middle">Title</text>
  <rect x="200" y="70" width="90" height="18" rx="3" fill="#4da3ff" opacity="0.12" stroke="#4da3ff" stroke-width="1"/>
  <text x="245" y="83" font-family="Arial,sans-serif" font-size="9" fill="#8dc4f8" text-anchor="middle">Authors</text>
  <rect x="200" y="96" width="90" height="18" rx="3" fill="#4da3ff" opacity="0.12" stroke="#4da3ff" stroke-width="1"/>
  <text x="245" y="109" font-family="Arial,sans-serif" font-size="9" fill="#8dc4f8" text-anchor="middle">References</text>
  <!-- More arrows and fields -->
  <rect x="310" y="44" width="80" height="18" rx="3" fill="#4da3ff" opacity="0.1" stroke="#4da3ff" stroke-width="0.8" opacity="0.5"/>
  <text x="350" y="57" font-family="Arial,sans-serif" font-size="9" fill="#8dc4f8" text-anchor="middle" opacity="0.7">Abstract</text>
  <rect x="310" y="70" width="80" height="18" rx="3" fill="#4da3ff" opacity="0.1" stroke="#4da3ff" stroke-width="0.8" opacity="0.5"/>
  <text x="350" y="83" font-family="Arial,sans-serif" font-size="9" fill="#8dc4f8" text-anchor="middle" opacity="0.7">Keywords</text>
  <rect x="310" y="96" width="80" height="18" rx="3" fill="#4da3ff" opacity="0.1" stroke="#4da3ff" stroke-width="0.8" opacity="0.5"/>
  <text x="350" y="109" font-family="Arial,sans-serif" font-size="9" fill="#8dc4f8" text-anchor="middle" opacity="0.7">DOI</text>
  <line x1="290" y1="53" x2="308" y2="53" stroke="#8dc4f8" stroke-width="1" opacity="0.4" marker-end="url(#pdf-arr)"/>
  <line x1="290" y1="79" x2="308" y2="79" stroke="#8dc4f8" stroke-width="1" opacity="0.4" marker-end="url(#pdf-arr)"/>
  <line x1="290" y1="105" x2="308" y2="105" stroke="#8dc4f8" stroke-width="1" opacity="0.4" marker-end="url(#pdf-arr)"/>
  <!-- GROBID label -->
  <rect x="400" y="76" width="100" height="28" rx="4" fill="#4da3ff" opacity="0.15" stroke="#4da3ff" stroke-width="1"/>
  <text x="450" y="94" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4da3ff" text-anchor="middle">GROBID</text>
  <!-- Connecting lines from fields to GROBID -->
  <line x1="392" y1="53" x2="420" y2="80" stroke="#8dc4f8" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,2"/>
  <line x1="392" y1="79" x2="400" y2="84" stroke="#8dc4f8" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,2"/>
  <line x1="392" y1="105" x2="420" y2="100" stroke="#8dc4f8" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,2"/>

  <!-- Right panel -->
  <text x="630" y="78" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="white" text-anchor="middle">PDF Metadata Extractor</text>
  <text x="630" y="100" font-family="Arial,sans-serif" font-size="12" fill="#8dc4f8" text-anchor="middle">GROBID · LANL · Real-Time</text>
</svg>
