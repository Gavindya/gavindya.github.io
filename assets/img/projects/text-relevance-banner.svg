<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a0a3a"/>
      <stop offset="100%" stop-color="#5a0a72"/>
    </linearGradient>
    <linearGradient id="tr-highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" fill="url(#tr-bg)" rx="8"/>

  <!-- Document panel (left) -->
  <g transform="translate(25, 20)">
    <!-- Document frame -->
    <rect width="180" height="145" rx="5" fill="#1a0a28" stroke="#c084fc" stroke-width="0.8" opacity="0.8"/>

    <!-- Text lines with relevance highlighting -->
    <rect x="10" y="12" width="120" height="7" rx="2" fill="#c084fc" opacity="0.15"/>
    <rect x="10" y="12" width="120" height="7" rx="2" fill="#c084fc" opacity="0.15"/>
    <rect x="10" y="24" width="160" height="5" rx="1" fill="#888" opacity="0.4"/>
    <rect x="10" y="34" width="145" height="5" rx="1" fill="#888" opacity="0.4"/>

    <!-- Highlighted relevant sentence -->
    <rect x="8" y="47" width="164" height="8" rx="2" fill="#c084fc" opacity="0.3"/>
    <rect x="10" y="48" width="158" height="5" rx="1" fill="#e0b0ff" opacity="0.6"/>

    <rect x="10" y="62" width="130" height="5" rx="1" fill="#888" opacity="0.4"/>
    <rect x="10" y="72" width="155" height="5" rx="1" fill="#888" opacity="0.4"/>

    <!-- Another highlight - misinformation marker -->
    <rect x="8" y="84" width="164" height="8" rx="2" fill="#f87171" opacity="0.2"/>
    <rect x="10" y="85" width="145" height="5" rx="1" fill="#fca5a5" opacity="0.5"/>

    <rect x="10" y="98" width="120" height="5" rx="1" fill="#888" opacity="0.4"/>
    <rect x="10" y="108" width="150" height="5" rx="1" fill="#888" opacity="0.4"/>
    <rect x="10" y="118" width="100" height="5" rx="1" fill="#888" opacity="0.4"/>

    <!-- Pupil overlay on document -->
    <circle cx="90" cy="75" r="35" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.25"/>
    <circle cx="90" cy="75" r="25" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
    <circle cx="90" cy="75" r="14" fill="#c084fc" opacity="0.1"/>
    <circle cx="90" cy="75" r="7" fill="#c084fc" opacity="0.4" filter="url(#glow)"/>
    <circle cx="90" cy="75" r="3" fill="#1a0a28"/>
    <circle cx="93" cy="72" r="2" fill="white" opacity="0.5"/>
  </g>

  <!-- Divider -->
  <line x1="220" y1="15" x2="220" y2="165" stroke="#c084fc" stroke-width="0.5" opacity="0.3"/>

  <!-- Cognitive load bar chart (middle panel) -->
  <g transform="translate(235, 15)">
    <text x="85" y="15" font-family="sans-serif" font-size="9" fill="#c084fc" text-anchor="middle" opacity="0.8">Cognitive Load (LHIPA)</text>
    <!-- Axes -->
    <line x1="15" y1="20" x2="15" y2="145" stroke="#c084fc" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="145" x2="170" y2="145" stroke="#c084fc" stroke-width="1" opacity="0.4"/>
    <!-- Bars -->
    <rect x="25" y="80" width="28" height="65" rx="2" fill="#c084fc" opacity="0.6"/>
    <rect x="65" y="55" width="28" height="90" rx="2" fill="#f87171" opacity="0.7"/>
    <rect x="105" y="95" width="28" height="50" rx="2" fill="#c084fc" opacity="0.6"/>
    <rect x="145" y="40" width="28" height="105" rx="2" fill="#f87171" opacity="0.7"/>
    <!-- Labels -->
    <text x="39" y="158" font-family="sans-serif" font-size="7" fill="#c084fc" text-anchor="middle" opacity="0.7">Rel.</text>
    <text x="79" y="158" font-family="sans-serif" font-size="7" fill="#f87171" text-anchor="middle" opacity="0.7">Bias</text>
    <text x="119" y="158" font-family="sans-serif" font-size="7" fill="#c084fc" text-anchor="middle" opacity="0.7">Irrel.</text>
    <text x="159" y="158" font-family="sans-serif" font-size="7" fill="#f87171" text-anchor="middle" opacity="0.7">False</text>
  </g>

  <!-- Divider 2 -->
  <line x1="435" y1="15" x2="435" y2="165" stroke="#c084fc" stroke-width="0.5" opacity="0.3"/>

  <!-- Right text panel -->
  <text x="617" y="65" font-family="sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle">Relevance, Bias &amp;</text>
  <text x="617" y="88" font-family="sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="middle">Misinformation</text>
  <text x="617" y="112" font-family="sans-serif" font-size="12" fill="#d8a8ff" text-anchor="middle">Cognitive Load · Eye Tracking</text>
  <text x="617" y="132" font-family="sans-serif" font-size="11" fill="#9a68b8" text-anchor="middle">Confirmation Bias · LHIPA · CHIIR</text>
</svg>
