<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lhipa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031b40"/>
      <stop offset="100%" stop-color="#0a4a96"/>
    </linearGradient>
  </defs>
  <rect width="800" height="180" rx="8" fill="url(#lhipa-bg)"/>
  <g stroke="#4da3ff" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="36" x2="800" y2="36"/><line x1="0" y1="72" x2="800" y2="72"/>
    <line x1="0" y1="108" x2="800" y2="108"/><line x1="0" y1="144" x2="800" y2="144"/>
    <line x1="160" y1="0" x2="160" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="480" y1="0" x2="480" y2="180"/><line x1="640" y1="0" x2="640" y2="180"/>
  </g>
  <!-- Left panel: pupil/eye with oscillation rings -->
  <ellipse cx="80" cy="90" rx="38" ry="22" fill="none" stroke="#4da3ff" stroke-width="1.5" opacity="0.7"/>
  <circle cx="80" cy="90" r="16" fill="none" stroke="#4da3ff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="80" cy="90" r="10" fill="#4da3ff" opacity="0.2"/>
  <circle cx="80" cy="90" r="6" fill="#4da3ff" opacity="0.7"/>
  <circle cx="82" cy="88" r="2.5" fill="white" opacity="0.8"/>
  <!-- Oscillation rings pulsing out -->
  <circle cx="80" cy="90" r="22" fill="none" stroke="#8dc4f8" stroke-width="0.8" opacity="0.4"/>
  <circle cx="80" cy="90" r="30" fill="none" stroke="#8dc4f8" stroke-width="0.6" opacity="0.25"/>
  <circle cx="80" cy="90" r="40" fill="none" stroke="#8dc4f8" stroke-width="0.5" opacity="0.15"/>

  <!-- Middle: pupil oscillation waveform + frequency bands -->
  <!-- Main waveform -->
  <polyline points="160,90 175,65 190,115 205,55 220,125 235,70 250,110 265,75 280,105 295,80 310,100 325,85 340,95 355,82 370,98 385,86 400,94 415,88 430,92 445,89 460,91 475,88 490,92" fill="none" stroke="#4da3ff" stroke-width="2" opacity="0.9"/>
  <!-- Frequency band overlays -->
  <polyline points="160,90 185,78 210,102 235,80 260,98 285,84 310,94 335,87 360,92 385,88 410,91 435,89 460,91 485,89 510,90" fill="none" stroke="#8dc4f8" stroke-width="1.2" opacity="0.5" stroke-dasharray="3,2"/>
  <polyline points="160,90 195,82 230,98 265,84 300,94 335,87 370,92 405,89 440,91 475,89 510,90" fill="none" stroke="#8dc4f8" stroke-width="1" opacity="0.35" stroke-dasharray="2,3"/>
  <!-- Band labels -->
  <rect x="162" y="28" width="60" height="14" rx="3" fill="#4da3ff" opacity="0.12"/>
  <text x="192" y="39" font-family="Arial,sans-serif" font-size="9" fill="#8dc4f8" text-anchor="middle">LF band</text>
  <rect x="162" y="46" width="60" height="14" rx="3" fill="#4da3ff" opacity="0.08"/>
  <text x="192" y="57" font-family="Arial,sans-serif" font-size="9" fill="#8dc4f8" text-anchor="middle">HF band</text>
  <!-- Vertical frequency markers -->
  <line x1="220" y1="20" x2="220" y2="160" stroke="#4da3ff" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,4"/>
  <line x1="310" y1="20" x2="310" y2="160" stroke="#4da3ff" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,4"/>
  <line x1="400" y1="20" x2="400" y2="160" stroke="#4da3ff" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,4"/>
  <line x1="490" y1="20" x2="490" y2="160" stroke="#4da3ff" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,4"/>
  <!-- Amplitude envelope -->
  <path d="M160,60 Q240,40 320,55 Q400,45 480,58 Q540,52 560,55" fill="none" stroke="#4da3ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="1,3"/>
  <path d="M160,120 Q240,140 320,125 Q400,135 480,122 Q540,128 560,125" fill="none" stroke="#4da3ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="1,3"/>

  <!-- Right panel -->
  <text x="630" y="78" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="white" text-anchor="middle">Real-Time LHIPA</text>
  <text x="630" y="100" font-family="Arial,sans-serif" font-size="11" fill="#8dc4f8" text-anchor="middle">Cognitive Load · Pupillometry</text>
  <text x="630" y="116" font-family="Arial,sans-serif" font-size="11" fill="#8dc4f8" text-anchor="middle">Clemson</text>
</svg>
