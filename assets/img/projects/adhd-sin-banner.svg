<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sin-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031b40"/>
      <stop offset="100%" stop-color="#0a4a96"/>
    </linearGradient>
  </defs>
  <rect width="800" height="180" rx="8" fill="url(#sin-bg)"/>
  <g stroke="#4da3ff" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="36" x2="800" y2="36"/><line x1="0" y1="72" x2="800" y2="72"/>
    <line x1="0" y1="108" x2="800" y2="108"/><line x1="0" y1="144" x2="800" y2="144"/>
    <line x1="160" y1="0" x2="160" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="480" y1="0" x2="480" y2="180"/><line x1="640" y1="0" x2="640" y2="180"/>
  </g>
  <!-- Left panel: ear/audio symbol with gaze overlay -->
  <!-- Speaker icon -->
  <rect x="30" y="70" width="22" height="40" rx="3" fill="none" stroke="#4da3ff" stroke-width="1.5" opacity="0.8"/>
  <polygon points="52,75 70,55 70,125 52,110" fill="none" stroke="#4da3ff" stroke-width="1.5" opacity="0.8"/>
  <!-- Sound arcs -->
  <path d="M74,72 Q88,90 74,108" fill="none" stroke="#8dc4f8" stroke-width="1.5" opacity="0.7"/>
  <path d="M80,63 Q100,90 80,117" fill="none" stroke="#8dc4f8" stroke-width="1.2" opacity="0.5"/>
  <path d="M86,54 Q112,90 86,126" fill="none" stroke="#8dc4f8" stroke-width="1" opacity="0.3"/>
  <!-- Eye gaze dot overlaid -->
  <circle cx="60" cy="90" r="8" fill="#4da3ff" opacity="0.15"/>
  <circle cx="60" cy="90" r="4" fill="#4da3ff" opacity="0.6"/>
  <circle cx="62" cy="88" r="1.5" fill="white" opacity="0.7"/>

  <!-- Middle: audio waveform + gaze signal overlay + SNR bands -->
  <!-- SNR band backgrounds -->
  <rect x="160" y="20" width="420" height="35" rx="2" fill="#4da3ff" opacity="0.04"/>
  <rect x="160" y="55" width="420" height="70" rx="2" fill="#4da3ff" opacity="0.07"/>
  <rect x="160" y="125" width="420" height="35" rx="2" fill="#4da3ff" opacity="0.04"/>
  <!-- Band labels -->
  <text x="165" y="32" font-family="Arial,sans-serif" font-size="8" fill="#8dc4f8" opacity="0.6">+SNR</text>
  <text x="165" y="65" font-family="Arial,sans-serif" font-size="8" fill="#8dc4f8" opacity="0.6">0 dB</text>
  <text x="165" y="135" font-family="Arial,sans-serif" font-size="8" fill="#8dc4f8" opacity="0.6">-SNR</text>
  <!-- Dashed SNR dividers -->
  <line x1="160" y1="55" x2="580" y2="55" stroke="#4da3ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="160" y1="90" x2="580" y2="90" stroke="#4da3ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="160" y1="125" x2="580" y2="125" stroke="#4da3ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,3"/>
  <!-- Audio waveform (noisy) -->
  <polyline points="165,90 172,68 179,112 186,60 193,118 200,72 207,108 214,65 221,115 228,74 235,105 242,70 249,110 256,76 263,102 270,73 277,107 284,78 291,100 298,80 305,98 312,82 319,96 326,84 333,94 340,83 347,95 354,85 361,93 368,86 375,92 382,87 389,91 396,88 403,90 410,87 417,91 424,88 431,90" fill="none" stroke="#4da3ff" stroke-width="1.8" opacity="0.85"/>
  <!-- Gaze signal overlay (smoother) -->
  <polyline points="165,90 185,78 205,102 225,75 245,108 265,80 285,98 305,84 325,94 345,86 365,92 385,88 405,91 425,89 445,90" fill="none" stroke="#8dc4f8" stroke-width="1.5" opacity="0.55" stroke-dasharray="5,2"/>
  <!-- Noise floor visualization -->
  <polyline points="165,115 185,118 205,112 225,117 245,113 265,116 285,114 305,117 325,113 345,116 365,114 385,117 405,115 425,116 445,114" fill="none" stroke="#8dc4f8" stroke-width="0.8" opacity="0.3"/>

  <!-- Right panel -->
  <text x="630" y="78" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="white" text-anchor="middle">ADHD &amp; Speech-In-Noise</text>
  <text x="630" y="100" font-family="Arial,sans-serif" font-size="12" fill="#8dc4f8" text-anchor="middle">Eye Tracking · Audiovisual Study</text>
</svg>
