<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ra-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a33"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <linearGradient id="ra-flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a5ab2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4da3ff" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" fill="url(#ra-bg)" rx="8"/>

  <!-- Pipeline stages -->
  <!-- Stage 1: Eye Tracker -->
  <g transform="translate(30, 55)">
    <rect width="100" height="70" rx="6" fill="#0a3060" stroke="#4da3ff" stroke-width="1.2" opacity="0.9"/>
    <text x="50" y="22" font-family="sans-serif" font-size="9" font-weight="600" fill="#4da3ff" text-anchor="middle">Eye Tracker</text>
    <!-- Eye icon -->
    <ellipse cx="50" cy="43" rx="20" ry="12" fill="none" stroke="#4da3ff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="50" cy="43" r="6" fill="#4da3ff" opacity="0.7"/>
    <circle cx="50" cy="43" r="3" fill="#001a33"/>
    <circle cx="52" cy="41" r="1.5" fill="white" opacity="0.5"/>
    <text x="50" y="63" font-family="sans-serif" font-size="7" fill="#8dc4f8" text-anchor="middle">Raw Gaze</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(135, 88)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#4da3ff" stroke-width="1.5" opacity="0.7"/>
    <polygon points="30,0 23,-4 23,4" fill="#4da3ff" opacity="0.7"/>
  </g>

  <!-- Stage 2: Preprocessing -->
  <g transform="translate(170, 55)">
    <rect width="100" height="70" rx="6" fill="#0a3060" stroke="#4da3ff" stroke-width="1.2" opacity="0.9"/>
    <text x="50" y="20" font-family="sans-serif" font-size="8" font-weight="600" fill="#4da3ff" text-anchor="middle">Preprocessing</text>
    <path d="M15,38 Q25,28 35,38 Q45,48 55,38 Q65,28 75,38 Q80,43 85,38" fill="none" stroke="#4da3ff" stroke-width="1.5" opacity="0.8"/>
    <text x="50" y="55" font-family="sans-serif" font-size="7" fill="#8dc4f8" text-anchor="middle">Fixations</text>
    <text x="50" y="65" font-family="sans-serif" font-size="7" fill="#8dc4f8" text-anchor="middle">Saccades</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(275, 88)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#4da3ff" stroke-width="1.5" opacity="0.7"/>
    <polygon points="30,0 23,-4 23,4" fill="#4da3ff" opacity="0.7"/>
  </g>

  <!-- Stage 3: Analysis -->
  <g transform="translate(310, 40)">
    <rect width="110" height="100" rx="6" fill="#0a3060" stroke="#4da3ff" stroke-width="1.5" opacity="0.9"/>
    <text x="55" y="18" font-family="sans-serif" font-size="8" font-weight="700" fill="#4da3ff" text-anchor="middle">RAEMAP</text>
    <text x="55" y="30" font-family="sans-serif" font-size="7" fill="#8dc4f8" text-anchor="middle">Analysis Engine</text>
    <line x1="10" y1="35" x2="100" y2="35" stroke="#4da3ff" stroke-width="0.5" opacity="0.3"/>
    <text x="55" y="48" font-family="sans-serif" font-size="7" fill="#6db8ff" text-anchor="middle">• Gaze Entropy</text>
    <text x="55" y="60" font-family="sans-serif" font-size="7" fill="#6db8ff" text-anchor="middle">• Ambient/Focal K</text>
    <text x="55" y="72" font-family="sans-serif" font-size="7" fill="#6db8ff" text-anchor="middle">• Cognitive Load</text>
    <text x="55" y="84" font-family="sans-serif" font-size="7" fill="#6db8ff" text-anchor="middle">• RIPA / RIPA2</text>
    <text x="55" y="95" font-family="sans-serif" font-size="6" fill="#4da3ff" opacity="0.7" text-anchor="middle">Real-Time</text>
  </g>

  <!-- Arrow 3 -->
  <g transform="translate(425, 88)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#4da3ff" stroke-width="1.5" opacity="0.7"/>
    <polygon points="30,0 23,-4 23,4" fill="#4da3ff" opacity="0.7"/>
  </g>

  <!-- Stage 4: Visualization -->
  <g transform="translate(460, 55)">
    <rect width="110" height="70" rx="6" fill="#0a3060" stroke="#4da3ff" stroke-width="1.2" opacity="0.9"/>
    <text x="55" y="18" font-family="sans-serif" font-size="8" font-weight="600" fill="#4da3ff" text-anchor="middle">Visualization</text>
    <!-- Mini chart -->
    <polyline points="10,55 22,45 34,50 46,35 58,42 70,30 82,38 94,32 100,35" fill="none" stroke="#4da3ff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="70" cy="30" r="3" fill="#4da3ff" opacity="0.9"/>
    <circle cx="46" cy="35" r="3" fill="#4da3ff" opacity="0.9"/>
  </g>

  <!-- Title text -->
  <text x="660" y="82" font-family="sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">RAEMAP</text>
  <text x="660" y="105" font-family="sans-serif" font-size="10" fill="#8dc4f8" text-anchor="middle">Real-Time Advanced Eye</text>
  <text x="660" y="119" font-family="sans-serif" font-size="10" fill="#8dc4f8" text-anchor="middle">Movements Analysis Pipeline</text>
  <text x="660" y="140" font-family="sans-serif" font-size="9" fill="#4a7ab0" text-anchor="middle">Python · WebSockets · HvPlot</text>
</svg>
