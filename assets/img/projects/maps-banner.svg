<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03281a"/>
      <stop offset="100%" stop-color="#065038"/>
    </linearGradient>
    <linearGradient id="mb-path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e096" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#00e096" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e096" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" fill="url(#mb-bg)" rx="8"/>

  <!-- Map grid (left panel) -->
  <g opacity="0.25">
    <line x1="0" y1="30" x2="420" y2="30" stroke="#00e096" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="420" y2="60" stroke="#00e096" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="420" y2="90" stroke="#00e096" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="420" y2="120" stroke="#00e096" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="420" y2="150" stroke="#00e096" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="180" stroke="#00e096" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="180" stroke="#00e096" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="180" stroke="#00e096" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="180" stroke="#00e096" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="180" stroke="#00e096" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="180" stroke="#00e096" stroke-width="0.5"/>
    <line x1="420" y1="0" x2="420" y2="180" stroke="#00e096" stroke-width="0.5"/>
  </g>

  <!-- Scanpath trajectory -->
  <path d="M50,140 L90,110 L130,75 L80,50 L150,40 L200,70 L260,45 L310,80 L350,55 L390,90 L350,130 L290,140 L230,120 L170,145 L110,155 L60,145"
        fill="none" stroke="url(#mb-path)" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Fixation circles (scanpath nodes) -->
  <g opacity="0.9">
    <circle cx="50" cy="140" r="8" fill="none" stroke="#00e096" stroke-width="2"/>
    <circle cx="50" cy="140" r="3" fill="#00e096"/>
    <circle cx="130" cy="75" r="12" fill="none" stroke="#00e096" stroke-width="2"/>
    <circle cx="130" cy="75" r="4" fill="#00e096"/>
    <circle cx="200" cy="70" r="7" fill="none" stroke="#00e096" stroke-width="1.5"/>
    <circle cx="200" cy="70" r="2.5" fill="#00e096"/>
    <circle cx="260" cy="45" r="10" fill="none" stroke="#00e096" stroke-width="2"/>
    <circle cx="260" cy="45" r="3.5" fill="#00e096"/>
    <circle cx="310" cy="80" r="6" fill="none" stroke="#00e096" stroke-width="1.5"/>
    <circle cx="310" cy="80" r="2" fill="#00e096"/>
    <circle cx="390" cy="90" r="14" fill="none" stroke="#00e096" stroke-width="2.5" opacity="0.6"/>
    <circle cx="390" cy="90" r="5" fill="#00e096"/>
  </g>

  <!-- Saccade arrows -->
  <g stroke="#00e096" stroke-width="1" opacity="0.4">
    <line x1="50" y1="140" x2="90" y2="112"/>
    <line x1="90" y1="110" x2="128" y2="77"/>
    <line x1="130" y1="75" x2="80" y2="52"/>
    <line x1="80" y1="50" x2="148" y2="41"/>
    <line x1="150" y1="40" x2="198" y2="69"/>
    <line x1="200" y1="70" x2="258" y2="47"/>
    <line x1="260" y1="45" x2="308" y2="79"/>
  </g>

  <!-- Divider -->
  <line x1="430" y1="15" x2="430" y2="165" stroke="#00e096" stroke-width="0.5" opacity="0.3"/>

  <!-- Labels left panel -->
  <text x="215" y="170" font-family="sans-serif" font-size="9" fill="#4de8b0" text-anchor="middle" opacity="0.7">Scanpath Visualization</text>

  <!-- Right panel text -->
  <text x="615" y="72" font-family="sans-serif" font-size="19" font-weight="700" fill="white" text-anchor="middle">Map-Based Visual</text>
  <text x="615" y="96" font-family="sans-serif" font-size="19" font-weight="700" fill="white" text-anchor="middle">Search &amp; Attention</text>
  <text x="615" y="120" font-family="sans-serif" font-size="13" fill="#4de8b0" text-anchor="middle">Scanpath · Ambient/Focal · ETRA</text>
  <text x="615" y="140" font-family="sans-serif" font-size="10" fill="#2ab080" text-anchor="middle">Cartographic · Satellite · Route Planning</text>
</svg>
