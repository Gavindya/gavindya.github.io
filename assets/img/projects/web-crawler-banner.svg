<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="crawler-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031b40"/>
      <stop offset="100%" stop-color="#0a4a96"/>
    </linearGradient>
  </defs>
  <rect width="800" height="180" rx="8" fill="url(#crawler-bg)"/>
  <g stroke="#4da3ff" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="36" x2="800" y2="36"/><line x1="0" y1="72" x2="800" y2="72"/>
    <line x1="0" y1="108" x2="800" y2="108"/><line x1="0" y1="144" x2="800" y2="144"/>
    <line x1="160" y1="0" x2="160" y2="180"/><line x1="320" y1="0" x2="320" y2="180"/>
    <line x1="480" y1="0" x2="480" y2="180"/><line x1="640" y1="0" x2="640" y2="180"/>
  </g>
  <!-- Left panel: spider/web icon -->
  <!-- Web lines -->
  <line x1="80" y1="30" x2="80" y2="150" stroke="#4da3ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="20" y1="90" x2="140" y2="90" stroke="#4da3ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="37" y1="47" x2="123" y2="133" stroke="#4da3ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="123" y1="47" x2="37" y2="133" stroke="#4da3ff" stroke-width="0.8" opacity="0.4"/>
  <!-- Web rings -->
  <ellipse cx="80" cy="90" rx="18" ry="18" fill="none" stroke="#4da3ff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="80" cy="90" rx="36" ry="36" fill="none" stroke="#4da3ff" stroke-width="0.9" opacity="0.4"/>
  <ellipse cx="80" cy="90" rx="54" ry="54" fill="none" stroke="#4da3ff" stroke-width="0.8" opacity="0.3"/>
  <!-- Center node -->
  <circle cx="80" cy="90" r="7" fill="#4da3ff" opacity="0.7"/>

  <!-- Middle: network graph nodes with crawl arrows -->
  <defs>
    <marker id="crawl-arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#4da3ff" opacity="0.8"/>
    </marker>
  </defs>
  <!-- Central hub node -->
  <circle cx="310" cy="90" r="12" fill="#4da3ff" opacity="0.3" stroke="#4da3ff" stroke-width="1.5"/>
  <circle cx="310" cy="90" r="6" fill="#4da3ff" opacity="0.8"/>
  <!-- Satellite nodes -->
  <circle cx="220" cy="50" r="8" fill="#4da3ff" opacity="0.2" stroke="#4da3ff" stroke-width="1.2"/>
  <circle cx="220" cy="130" r="8" fill="#4da3ff" opacity="0.2" stroke="#4da3ff" stroke-width="1.2"/>
  <circle cx="400" cy="50" r="8" fill="#4da3ff" opacity="0.2" stroke="#4da3ff" stroke-width="1.2"/>
  <circle cx="400" cy="130" r="8" fill="#4da3ff" opacity="0.2" stroke="#4da3ff" stroke-width="1.2"/>
  <circle cx="180" cy="90" r="6" fill="#8dc4f8" opacity="0.3" stroke="#8dc4f8" stroke-width="1"/>
  <circle cx="440" cy="90" r="6" fill="#8dc4f8" opacity="0.3" stroke="#8dc4f8" stroke-width="1"/>
  <circle cx="310" cy="30" r="6" fill="#8dc4f8" opacity="0.3" stroke="#8dc4f8" stroke-width="1"/>
  <circle cx="310" cy="150" r="6" fill="#8dc4f8" opacity="0.3" stroke="#8dc4f8" stroke-width="1"/>
  <!-- Connection arrows (crawl paths) -->
  <line x1="186" y1="90" x2="296" y2="90" stroke="#4da3ff" stroke-width="1.2" opacity="0.6" marker-end="url(#crawl-arr)"/>
  <line x1="310" y1="36" x2="310" y2="76" stroke="#4da3ff" stroke-width="1.2" opacity="0.6" marker-end="url(#crawl-arr)"/>
  <line x1="322" y1="80" x2="392" y2="56" stroke="#4da3ff" stroke-width="1.2" opacity="0.6" marker-end="url(#crawl-arr)"/>
  <line x1="322" y1="100" x2="392" y2="124" stroke="#4da3ff" stroke-width="1.2" opacity="0.6" marker-end="url(#crawl-arr)"/>
  <line x1="298" y1="80" x2="228" y2="56" stroke="#8dc4f8" stroke-width="1" opacity="0.4" marker-end="url(#crawl-arr)"/>
  <line x1="298" y1="100" x2="228" y2="124" stroke="#8dc4f8" stroke-width="1" opacity="0.4" marker-end="url(#crawl-arr)"/>
  <line x1="324" y1="90" x2="432" y2="90" stroke="#8dc4f8" stroke-width="1" opacity="0.4" marker-end="url(#crawl-arr)"/>
  <line x1="310" y1="104" x2="310" y2="142" stroke="#8dc4f8" stroke-width="1" opacity="0.4" marker-end="url(#crawl-arr)"/>
  <!-- Outer nodes -->
  <circle cx="460" cy="45" r="5" fill="#8dc4f8" opacity="0.2" stroke="#8dc4f8" stroke-width="0.8"/>
  <circle cx="460" cy="135" r="5" fill="#8dc4f8" opacity="0.2" stroke="#8dc4f8" stroke-width="0.8"/>
  <line x1="408" y1="52" x2="455" y2="48" stroke="#8dc4f8" stroke-width="0.8" opacity="0.3" marker-end="url(#crawl-arr)"/>
  <line x1="408" y1="128" x2="455" y2="132" stroke="#8dc4f8" stroke-width="0.8" opacity="0.3" marker-end="url(#crawl-arr)"/>
  <!-- URL queue label -->
  <rect x="460" y="78" width="90" height="24" rx="3" fill="#4da3ff" opacity="0.1" stroke="#4da3ff" stroke-width="0.8" opacity="0.5"/>
  <text x="505" y="94" font-family="Arial,sans-serif" font-size="9" fill="#8dc4f8" text-anchor="middle" opacity="0.7">URL Queue</text>

  <!-- Right panel -->
  <text x="635" y="78" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="white" text-anchor="middle">Focused Web Crawler</text>
  <text x="635" y="100" font-family="Arial,sans-serif" font-size="12" fill="#8dc4f8" text-anchor="middle">Academic Web · URL Scheduling</text>
</svg>
