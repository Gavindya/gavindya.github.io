<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031b40"/>
      <stop offset="100%" stop-color="#0a4a96"/>
    </linearGradient>
    <linearGradient id="cg-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4da3ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#4da3ff" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#4da3ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4da3ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" fill="url(#cg-bg)" rx="8"/>

  <!-- Grid lines -->
  <line x1="0" y1="45" x2="800" y2="45" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="90" x2="800" y2="90" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="135" x2="800" y2="135" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <line x1="160" y1="0" x2="160" y2="180" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <line x1="320" y1="0" x2="320" y2="180" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <line x1="480" y1="0" x2="480" y2="180" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>

  <!-- Pupil (left panel) -->
  <g transform="translate(80, 90)">
    <circle r="68" fill="none" stroke="#4da3ff" stroke-width="0.5" opacity="0.2"/>
    <circle r="55" fill="none" stroke="#4da3ff" stroke-width="0.5" opacity="0.3"/>
    <circle r="42" fill="none" stroke="#4da3ff" stroke-width="0.8" opacity="0.4"/>
    <circle r="30" fill="none" stroke="#4da3ff" stroke-width="1" opacity="0.6"/>
    <circle r="20" fill="#1a5fac" opacity="0.9"/>
    <circle r="11" fill="#4da3ff" opacity="0.95"/>
    <circle r="5" fill="#001529"/>
    <circle cx="4" cy="-4" r="3" fill="white" opacity="0.6"/>
    <text y="4" font-family="sans-serif" font-size="7" fill="#8dc4f8" text-anchor="middle" opacity="0.7">pupil</text>
  </g>

  <!-- Divider -->
  <line x1="155" y1="20" x2="155" y2="160" stroke="#4da3ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Signal panel (right) -->
  <g transform="translate(170, 0)">
    <!-- Low cognitive load signal -->
    <text x="10" y="30" font-family="sans-serif" font-size="9" fill="#8dc4f8" opacity="0.7">Low Load</text>
    <path d="M10,55 Q30,50 50,55 Q70,60 90,55 Q110,50 130,55 Q150,58 170,54 Q190,50 210,55 Q230,58 250,54 Q270,50 290,55 Q310,58 330,55 Q350,50 370,55 Q390,58 410,54 Q430,50 450,55 Q470,58 490,55 Q510,50 530,55 Q550,58 570,54 Q590,50 610,55"
          fill="none" stroke="#4da3ff" stroke-width="1.8" opacity="0.7" stroke-dasharray="2,1"/>

    <!-- High cognitive load signal with spikes -->
    <text x="10" y="80" font-family="sans-serif" font-size="9" fill="#8dc4f8" opacity="0.7">High Load</text>
    <path d="M10,105 Q20,100 30,105 Q40,108 50,100 Q55,90 60,70 Q63,55 67,40 Q70,55 73,75 Q76,90 80,100 Q90,105 100,100 Q110,95 120,100 Q130,105 140,100 Q150,90 155,75 Q158,62 162,50 Q165,62 168,78 Q171,90 175,100 Q185,106 200,100 Q215,95 225,100 Q235,104 250,100 Q255,88 260,72 Q263,58 267,45 Q270,58 273,74 Q276,88 280,100 Q295,106 310,100 Q325,94 340,100 Q350,105 360,100 Q370,94 380,100 Q385,105 400,100 Q415,95 430,100 Q440,105 460,100 Q470,95 490,100 Q500,105 520,100 Q530,96 540,100 Q550,105 570,100 Q580,95 600,100 Q610,105 620,100"
          fill="none" stroke="#80c4ff" stroke-width="2" opacity="0.9"/>

    <!-- Highlight area under high load spikes -->
    <path d="M55,90 Q60,70 67,40 Q70,55 73,75 Q76,90 80,105 Z" fill="#4da3ff" opacity="0.15"/>
    <path d="M150,88 Q158,62 162,50 Q165,62 168,78 Q171,90 175,105 Z" fill="#4da3ff" opacity="0.15"/>
    <path d="M255,86 Q263,58 267,45 Q270,58 273,74 Q276,88 280,105 Z" fill="#4da3ff" opacity="0.15"/>
  </g>

  <!-- Right side text -->
  <text x="680" y="85" font-family="sans-serif" font-size="19" font-weight="700" fill="white" text-anchor="middle">Cognitive Load</text>
  <text x="680" y="108" font-family="sans-serif" font-size="14" fill="#8dc4f8" text-anchor="middle">Real-Time Detection</text>
  <text x="680" y="130" font-family="sans-serif" font-size="10" fill="#5a9ed8" text-anchor="middle">Pupillometry · RIPA · RIPA2</text>
</svg>
